<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>minerva — visualisation</title>
<style>
  :root { --bg:#f6f7f9; --panel:#fff; --border:#dde; --ink:#1a1a2e; --muted:#667; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,sans-serif; background:var(--bg); color:var(--ink); }
  header { display:flex; align-items:center; gap:18px; padding:10px 16px; flex-wrap:wrap;
           background:var(--panel); border-bottom:1px solid var(--border); }
  header h1 { font-size:16px; margin:0; }
  #filters { display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-size:13px; color:var(--muted); }
  #filters input[type="search"] { padding:3px 8px; border:1px solid var(--border); border-radius:6px; }
  #graph { height:52vh; background:var(--panel); border-bottom:1px solid var(--border); }
  #slider-bar { display:flex; gap:12px; align-items:center; padding:8px 16px;
                background:var(--panel); border-bottom:1px solid var(--border); font-size:13px; }
  #slider { flex:0 0 320px; }
  #moment-label { color:var(--muted); }
  #timeline-wrap { overflow-x:auto; background:var(--panel); }
  #banner { padding:24px; text-align:center; color:var(--muted); font-size:14px; }
  #tooltip { position:fixed; display:none; background:#1a1a2e; color:#fff; padding:8px 10px;
             border-radius:6px; font-size:12px; max-width:340px; pointer-events:none; z-index:10; }
  .track-label { cursor:pointer; }
</style>
</head>
<body>
<header>
  <h1>minerva</h1>
  <div id="filters">
    <span id="type-filters"></span>
    <label><input type="checkbox" id="hide-single"> masquer les apparitions uniques</label>
    <input type="search" id="search" placeholder="chercher une entité…">
  </div>
</header>
<div id="graph"></div>
<div id="slider-bar">
  <input type="range" id="slider" min="0" max="0" value="0" step="1">
  <span id="moment-label"></span>
</div>
<div id="timeline-wrap"><svg id="timeline"></svg></div>
<div id="banner" hidden>pas de timeline dans cette base (extraction sans moments)</div>
<div id="tooltip"></div>
<script>__FORCE_GRAPH_JS__</script>
<script>window.MINERVA_DATA = __MINERVA_DATA__;</script>
<script>
"use strict";
const D = window.MINERVA_DATA;
const byName = {}; D.entities.forEach(e => byName[e.name] = e);
const PALETTE = ["#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
                 "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ac"];
const TYPES = [...new Set(D.entities.map(e => e.type))].sort();
const typeColor = {}; TYPES.forEach((t, i) => typeColor[t] = PALETTE[i % PALETTE.length]);
const deg = {};
D.relations.forEach(r => { deg[r.source] = (deg[r.source]||0)+1; deg[r.target] = (deg[r.target]||0)+1; });
const trackCount = {}; D.tracks.forEach(t => trackCount[t.entity] = t.count);

const state = {
  atIndex: Math.max(0, D.moments.length - 1),  // défaut : dernier moment
  selected: null,                              // entité sélectionnée (couplage)
  neighbors: new Set(),
  types: new Set(TYPES),
  hideSingle: false,
  query: "",
  visE: null, visR: null,                      // visibilité au moment courant
};

function computeVisible() {
  if (!D.moments.length) { state.visE = null; state.visR = null; return; }
  const s = D.states[state.atIndex];
  state.visE = new Set(s.entities);
  state.visR = new Set(s.relations);
}
computeVisible();

function passesFilters(e) {
  if (!e || !state.types.has(e.type)) return false;
  if (state.hideSingle && (trackCount[e.name] || 0) === 1) return false;
  if (state.query) {
    const hay = (e.name + " " + e.aliases.join(" ")).toLowerCase();
    if (!hay.includes(state.query)) return false;
  }
  return true;
}

// ---------- Tooltips ----------
// esc() d'abord : tout contenu dynamique inséré dans un gabarit HTML est
// échappé (données issues du LLM = non fiables).
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
const tipEl = document.getElementById("tooltip");
function showTip(html, x, y) {   // html : gabarit local dont TOUTES les interpolations passent par esc()
  tipEl.innerHTML = html; tipEl.style.display = "block";
  tipEl.style.left = (x + 14) + "px"; tipEl.style.top = (y + 14) + "px";
}
function hideTip() { tipEl.style.display = "none"; }

function nodeTooltip(n) {
  const e = byName[n.id];
  let h = `<b>${esc(e.name)}</b> (${esc(e.type)})`;
  if (e.aliases.length) h += `<br>alias : ${e.aliases.map(esc).join(", ")}`;
  for (const [k, v] of Object.entries(e.attributes)) h += `<br>${esc(k)} : ${esc(v)}`;
  return h;
}
function linkTooltip(l) {
  const r = D.relations[l.i];
  let h = `<b>${esc(r.source)} —${esc(r.name)}→ ${esc(r.target)}</b>`;
  for (const [k, v] of Object.entries(r.attributes)) h += `<br>${esc(k)} : ${esc(v)}`;
  for (const a of r.assertions)
    h += `<br>${esc(a.attribute)} = ${esc(a.value)}` + (a.moment_id != null ? ` (M${Number(a.moment_id)})` : "");
  return h;
}

// ---------- Forcegraph ----------
const FADED = "rgba(160,168,185,0.15)";
function nodeColor(n) {
  const e = byName[n.id];
  if (state.visE && !state.visE.has(n.id)) return FADED;
  if (state.selected && n.id !== state.selected && !state.neighbors.has(n.id)) return "rgba(160,168,185,0.35)";
  return typeColor[e.type];
}
function linkColor(l) {
  if (state.visR && !state.visR.has(l.i)) return "rgba(160,168,185,0.08)";
  if (state.selected) {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    return (s === state.selected || t === state.selected) ? "#e15759" : "rgba(160,168,185,0.25)";
  }
  return "#99a";
}
const graphEl = document.getElementById("graph");
const fg = ForceGraph()(graphEl)
  .width(graphEl.clientWidth).height(graphEl.clientHeight)
  .graphData({
    nodes: D.entities.map(e => ({ id: e.name })),
    links: D.relations.map((r, i) => ({ source: r.source, target: r.target, i })),
  })
  .nodeVal(n => (deg[n.id] || 0) + 1)
  .nodeColor(nodeColor)
  .linkColor(linkColor)
  .linkDirectionalArrowLength(4)
  .linkDirectionalArrowRelPos(1)
  .nodeLabel(nodeTooltip)
  .linkLabel(linkTooltip)
  .nodeVisibility(n => passesFilters(byName[n.id]))
  .linkVisibility(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    return passesFilters(byName[s]) && passesFilters(byName[t]);
  })
  .nodeCanvasObjectMode(() => "after")
  .nodeCanvasObject((n, ctx, scale) => {   // canvas : pas de HTML, fillText est sûr
    if (scale < 1.2 && n.id !== state.selected) return;
    ctx.font = `${10 / scale}px sans-serif`;
    ctx.fillStyle = "#223";
    ctx.fillText(n.id, n.x + 7 / scale, n.y + 3 / scale);
  });
window.addEventListener("resize", () =>
  fg.width(graphEl.clientWidth).height(graphEl.clientHeight));

function repaintGraph() {   // idiome force-graph : re-poser un accessor le fait réévaluer
  fg.nodeColor(fg.nodeColor());
  fg.linkColor(fg.linkColor());
  fg.nodeVisibility(fg.nodeVisibility());
  fg.linkVisibility(fg.linkVisibility());
}

// ---------- Timeline de montage (SVG vanilla, layout ordinal) ----------
const SVGNS = "http://www.w3.org/2000/svg";
const COLW = 84, ROWH = 30, LEFT = 150, TOP = 46;
const tlSvg = document.getElementById("timeline");
function el(tag, attrs) {
  const node = document.createElementNS(SVGNS, tag);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  return node;
}
function renderTimeline() {
  tlSvg.replaceChildren();
  if (!D.moments.length) return;
  const rows = D.tracks.filter(t => passesFilters(byName[t.entity]));
  const N = D.moments.length;
  const W = LEFT + N * COLW + 20, H = TOP + rows.length * ROWH + 20;
  tlSvg.setAttribute("width", W); tlSvg.setAttribute("height", H);
  const x = o => LEFT + o * COLW;

  D.moments.forEach((m, idx) => {
    const bg = el("rect", { x: x(m.order), y: TOP - 6, width: COLW - 6, height: H - TOP,
                            fill: idx % 2 ? "#f3f5f9" : "#fafbfd" });
    bg.addEventListener("mousemove", ev =>
      showTip(`<b>M${Number(m.id)}</b> — ${esc(m.summary)} · ${m.days != null ? "j " + Number(m.days) : "j ?"}`, ev.clientX, ev.clientY));
    bg.addEventListener("mouseleave", hideTip);
    tlSvg.appendChild(bg);
    const head = el("text", { x: x(m.order) + (COLW - 6) / 2, y: 18,
                              "text-anchor": "middle", "font-size": 11, fill: "#334" });
    head.textContent = "M" + m.id; tlSvg.appendChild(head);
    const days = el("text", { x: x(m.order) + (COLW - 6) / 2, y: 32,
                              "text-anchor": "middle", "font-size": 10, fill: "#889" });
    days.textContent = m.days != null ? "j " + m.days : "j ?"; tlSvg.appendChild(days);
  });

  for (let o = 0; o < N - 1; o++) {   // écarts : étiquette si quantifié, pointillé sinon
    const gx = x(o + 1) - 3;
    if (D.gaps[String(o)] != null) {
      const g = el("text", { x: gx, y: TOP - 12, "text-anchor": "middle",
                             "font-size": 10, fill: "#c60" });
      g.textContent = "+" + D.gaps[String(o)] + " j"; tlSvg.appendChild(g);
    } else {
      tlSvg.appendChild(el("line", { x1: gx, y1: TOP - 6, x2: gx, y2: H - 14,
                                     stroke: "#ccd", "stroke-dasharray": "2,3" }));
    }
  }

  rows.forEach((t, i) => {
    const y = TOP + i * ROWH;
    const label = el("text", { x: LEFT - 10, y: y + ROWH / 2 + 4, "text-anchor": "end",
                               "font-size": 12, fill: "#223", class: "track-label" });
    label.textContent = t.entity;               // textContent : sûr
    label.dataset.entity = t.entity;
    if (t.entity === state.selected) label.setAttribute("font-weight", "bold");
    label.addEventListener("click", () =>
      select(state.selected === t.entity ? null : t.entity));
    tlSvg.appendChild(label);
    const color = typeColor[byName[t.entity].type];
    t.runs.forEach(([a, b]) => {
      const clip = el("rect", { x: x(a) + 2, y: y + 5, width: (b - a) * COLW + COLW - 14,
                                height: ROWH - 10, rx: 5, fill: color,
                                opacity: state.selected && t.entity !== state.selected ? 0.25 : 0.85 });
      clip.addEventListener("click", () =>
        select(state.selected === t.entity ? null : t.entity));
      clip.addEventListener("mousemove", ev => {
        const o = Math.floor((ev.clientX - tlSvg.getBoundingClientRect().left - LEFT) / COLW);
        const m = D.moments[Math.max(0, Math.min(o, D.moments.length - 1))];
        showTip(`<b>${esc(t.entity)}</b> · M${Number(m.id)} — ${esc(m.summary)} · ${m.days != null ? "j " + Number(m.days) : "j ?"}`, ev.clientX, ev.clientY);
      });
      clip.addEventListener("mouseleave", hideTip);
      tlSvg.appendChild(clip);
    });
  });

  const px = x(D.moments[state.atIndex].order) + (COLW - 6) / 2;  // tête de lecture
  tlSvg.appendChild(el("line", { x1: px, y1: TOP - 6, x2: px, y2: H - 14,
                                 stroke: "#e15759", "stroke-width": 2 }));
}

function select(name) {
  state.selected = name;
  state.neighbors = new Set();
  if (name) {
    D.relations.forEach(r => {
      if (r.source === name) state.neighbors.add(r.target);
      if (r.target === name) state.neighbors.add(r.source);
    });
  }
  renderTimeline();
  repaintGraph();
  if (name) {
    const label = [...tlSvg.querySelectorAll(".track-label")]
      .find(n => n.dataset.entity === name);   // pas de sélecteur interpolé : nom non fiable
    if (label) label.scrollIntoView({ block: "nearest", inline: "nearest" });
  }
}
fg.onNodeClick(n => select(state.selected === n.id ? null : n.id));
fg.onBackgroundClick(() => select(null));

// ---------- Slider temporel ----------
const slider = document.getElementById("slider");
const momentLabel = document.getElementById("moment-label");
function updateMomentLabel() {
  const m = D.moments[state.atIndex];
  momentLabel.textContent =   // textContent : sûr
    `M${m.id} — ${m.summary}` + (m.days != null ? ` · j ${m.days}` : "");
}
if (D.moments.length) {
  slider.max = D.moments.length - 1;
  slider.value = state.atIndex;
  updateMomentLabel();
  slider.addEventListener("input", () => {
    state.atIndex = Number(slider.value);
    computeVisible();
    updateMomentLabel();
    repaintGraph();
    renderTimeline();
  });
} else {   // pas de timeline : bandeau, on masque slider et timeline
  document.getElementById("slider-bar").style.display = "none";
  document.getElementById("timeline-wrap").style.display = "none";
  document.getElementById("banner").hidden = false;
}

// ---------- Filtres ----------
const typeFilters = document.getElementById("type-filters");
TYPES.forEach(t => {
  const label = document.createElement("label");
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = true;
  cb.addEventListener("change", () => {
    cb.checked ? state.types.add(t) : state.types.delete(t);
    applyFilters();
  });
  label.appendChild(cb);
  label.append(` ${t}`);            // append(texte) : sûr
  label.style.color = typeColor[t];
  typeFilters.appendChild(label);
});
document.getElementById("hide-single").addEventListener("change", ev => {
  state.hideSingle = ev.target.checked; applyFilters();
});
document.getElementById("search").addEventListener("input", ev => {
  state.query = ev.target.value.trim().toLowerCase(); applyFilters();
});
function applyFilters() {
  if (state.selected && !passesFilters(byName[state.selected])) { select(null); return; }
  repaintGraph();
  renderTimeline();
}

renderTimeline();
</script>
</body>
</html>
